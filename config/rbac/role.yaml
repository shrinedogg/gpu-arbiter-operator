---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/scale
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - gpu.biggs.dog
  resources:
  - gpuarbiters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gpu.biggs.dog
  resources:
  - gpuarbiters/finalizers
  verbs:
  - update
- apiGroups:
  - gpu.biggs.dog
  resources:
  - gpuarbiters/status
  verbs:
  - get
  - patch
  - update
