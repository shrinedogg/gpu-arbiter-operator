# Permissions the manager needs in its own namespace for leader election
# (coordination.k8s.io leases). controller-runtime's leader election uses a
# Lease per LeaderElectionID; grant full lease CRUD there.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gpu-arbiter-leader-election-role
  namespace: gpu-arbiter-system
  labels:
    app.kubernetes.io/name: gpu-arbiter-operator
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gpu-arbiter-leader-election-rolebinding
  namespace: gpu-arbiter-system
  labels:
    app.kubernetes.io/name: gpu-arbiter-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gpu-arbiter-leader-election-role
subjects:
  - kind: ServiceAccount
    name: gpu-arbiter-controller-manager
    namespace: gpu-arbiter-system
