---
# Inject a Pod scheduling gate onto every gaming-session pod so it stays
# SchedulingGated (and the wolf container never starts) until the
# gpu-arbiter-controller confirms VRAM is free and removes the gate. The
# direwolf operator strips pod-level template.spec fields (verified: hostIPC),
# so the gate cannot be set on the App CR; this native MutatingAdmissionPolicy
# adds it at pod CREATE.
#
# Carried over from the original bash gpu-arbiter unchanged.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicy
metadata:
  name: gpu-await-vram-gate
spec:
  # A policy error must NOT block launching a game; degrade to the old race.
  failurePolicy: Ignore
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
  matchConditions:
    # Idempotent: only add the gate when it isn't already present.
    - name: gate-absent
      expression: >-
        !has(object.spec.schedulingGates) ||
        !object.spec.schedulingGates.exists(g, g.name == "gpu.biggs.dog/await-vram")
  reinvocationPolicy: Never
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          [
            JSONPatch{
              op: "add",
              path: "/spec/schedulingGates",
              value: [{"name": "gpu.biggs.dog/await-vram"}]
            }
          ]
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: gpu-await-vram-gate
spec:
  policyName: gpu-await-vram-gate
  matchResources:
    # Scope to gaming-session pods in dreamcast only.
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: dreamcast
    objectSelector:
      matchLabels:
        app: direwolf-worker
